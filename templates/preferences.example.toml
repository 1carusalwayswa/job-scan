# job-scan preferences — generated by /job-scan setup
# Edit manually or re-run setup to regenerate.

[language]
# Your Swedish proficiency: "fluent", "basic", or "none"
# "none" or "basic" → jobs requiring fluent Swedish are filtered out (lang_gate)
swedish = "none"

[eligibility]
# Your citizenship/work permit status:
#   "eu_citizen"       → no restrictions
#   "non_eu_permit"    → has work permit, but security-cleared roles excluded
#   "needs_permit"     → may need sponsorship
citizenship = "non_eu_permit"
# If true, security-cleared roles (säkerhetsprövning, etc.) are excluded
exclude_security_cleared = true

[gates]
# Enable/disable individual gate scripts
lang_gate = true
citizenship_gate = true
staffing_gate = true
# Staffing company score cap (matched companies get this score)
staffing_score_cap = 55
# Occupation groups to exclude (Swedish codes from JobTech taxonomy)
# e.g. IT ops/support/network admin roles
exclude_occupation_groups = [
    "drifttekniker",
    "supporttekniker",
    "nätverkstekniker",
    "IT-chef",
]

[scoring]
# Score thresholds per lane — jobs scoring at or above are flagged for review
# Lane names must match exactly what LLM outputs (defined in search_config.json)
# Example:
# [scoring.thresholds]
# "Backend" = 65
# "Frontend" = 65
# "DevOps" = 60

[schedule]
# Time for daily auto-scan (24h format, local time)
fetch_time = "07:00"
# Whether to auto-score pending jobs after fetch (requires claude -p)
auto_score = true
# Max budget per auto-scoring run (USD)
max_budget_usd = 1.0
